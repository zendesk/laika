name: Continuous Integration

on:
  push:
    branches:
      - master
      - main
      - next
  pull_request:
    branches:
      - '**'

env:
  NODE_VERSION: 22

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    # runs-on: [self-hosted, zendesk-stable]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - id: find-yarn-cache-folder
        name: Find Yarn's cache folder
        run: echo "path=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"
      - name: Cache Yarn's cache folder
        uses: actions/cache@v4
        with:
          path: ${{ steps.find-yarn-cache-folder.outputs.path }}
          key: yarn-cache-folder-os-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-cache-folder-os-${{ runner.os }}-node-${{ env.NODE_VERSION }}-
            yarn-cache-folder-os-${{ runner.os }}-
      - name: Install dependencies
        run: |
          yarn install --immutable
          yarn build
      - name: Check formatting
        run: yarn test:format
      - name: Check types
        run: yarn test:types
      - name: Check lint
        run: yarn test:lint

  test:
    name: Unit Tests (Apollo 4)
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - id: find-yarn-cache-folder
        name: Find Yarn's cache folder
        run: echo "path=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"
      - name: Cache Yarn's cache folder
        uses: actions/cache@v4
        with:
          path: ${{ steps.find-yarn-cache-folder.outputs.path }}
          key: yarn-cache-folder-os-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-cache-folder-os-${{ runner.os }}-node-${{ env.NODE_VERSION }}-
            yarn-cache-folder-os-${{ runner.os }}-
      - name: Install dependencies
        run: yarn install --immutable
      - name: Run Jest suite
        run: yarn test:code --coverage --runInBand

  compat:
    name: Compatibility (${{ matrix.scenario }})
    runs-on: ubuntu-latest
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - apollo3
          - apollo4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - id: find-yarn-cache-folder
        name: Find Yarn's cache folder
        run: echo "path=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"
      - name: Cache Yarn's cache folder
        uses: actions/cache@v4
        with:
          path: ${{ steps.find-yarn-cache-folder.outputs.path }}
          key: yarn-cache-folder-os-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-cache-folder-os-${{ runner.os }}-node-${{ env.NODE_VERSION }}-
            yarn-cache-folder-os-${{ runner.os }}-
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build package
        run: yarn build
      - name: Validate packed consumer
        run: yarn test:compat:consumer --scenario ${{ matrix.scenario }}
      - name: Run Jest suite for scenario
        run: yarn test:compat:jest --scenario ${{ matrix.scenario }}

  docs:
    name: Docs
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - id: find-yarn-cache-folder
        name: Find Yarn's cache folder
        run: echo "path=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"
      - name: Cache Yarn's cache folder
        uses: actions/cache@v4
        with:
          path: ${{ steps.find-yarn-cache-folder.outputs.path }}
          key: yarn-cache-folder-os-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-cache-folder-os-${{ runner.os }}-node-${{ env.NODE_VERSION }}-
            yarn-cache-folder-os-${{ runner.os }}-
      - id: find-yarn-cache-folder-docs
        name: Find Docs Yarn's cache folder
        run: |
          cd docs
          echo "path=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"
      - name: Cache Docs Yarn's cache folder
        uses: actions/cache@v4
        with:
          path: ${{ steps.find-yarn-cache-folder-docs.outputs.path }}
          key: yarn-cache-folder-docs-os-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('docs/yarn.lock') }}
          restore-keys: |
            yarn-cache-folder-docs-os-${{ runner.os }}-node-${{ env.NODE_VERSION }}-
            yarn-cache-folder-docs-os-${{ runner.os }}-
      - name: Install dependencies
        run: |
          yarn install --immutable
          cd docs
          yarn install --immutable
      - name: Build docs
        run: |
          cd docs
          yarn build

  publish:
    name: Publish package to NPM
    needs:
      - checks
      - test
      - compat
      - docs
    runs-on: ubuntu-latest
    # runs-on: [self-hosted, zendesk-stable]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - id: find-yarn-cache-folder
        name: Find Yarn's cache folder
        run: echo "path=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"
      - name: Cache Yarn's cache folder
        uses: actions/cache@v4
        with:
          path: ${{ steps.find-yarn-cache-folder.outputs.path }}
          key: yarn-cache-folder-os-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-cache-folder-os-${{ runner.os }}-node-${{ env.NODE_VERSION }}-
            yarn-cache-folder-os-${{ runner.os }}-
      - name: Build and release
        run: |
          yarn install --immutable
          yarn build
          yarn release
        env:
          NPM_TOKEN: ${{secrets.NPM_TOKEN}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
